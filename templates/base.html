<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Chunks{% endblock %}</title>
    <link rel="icon" href="{% static 'img/favicon.ico' %}" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'img/favicon-32.png' %}">
    <link rel="apple-touch-icon" href="{% static 'img/apple-touch-icon.png' %}">
    <link rel="preconnect" href="https://fonts.acquired.fm" crossorigin>
    <link rel="stylesheet" href="{% static 'css/chunks.css' %}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header class="nav-combo" data-theme="light-fill">
        <nav class="nav" aria-label="Main">
            <div class="nav-flex">
                <a href="{% url 'episode_list' %}" class="nav-logo">
                    <img src="{% static 'img/favicon-32.png' %}" alt="" class="nav-logo-icon" width="28" height="28">
                    chunks
                </a>
                <form
                    method="get"
                    action="{% url 'retrieve' %}"
                    class="nav-search search-bar{% if request.resolver_match.url_name == 'retrieve' %} is-nav-active{% endif %}"
                    role="search"
                    aria-label="Semantic search"
                >
                    <input
                        type="search"
                        name="q"
                        class="search-input"
                        placeholder="{% block nav_search_placeholder %}Search episodes{% endblock %}"
                        value="{% if request.resolver_match.url_name == 'retrieve' %}{{ request.GET.q }}{% endif %}"
                        autocomplete="off"
                        {% if request.resolver_match.url_name == 'retrieve' %}autofocus{% endif %}
                    >
                    <span class="search-icon" aria-hidden="true">
                        <svg viewBox="0 0 16 16" fill="none">
                            <path d="M13.6464 14.3536L10.5 11.2071M11.5 7.5C11.5 9.70914 9.70914 11.5 7.5 11.5C5.29086 11.5 3.5 9.70914 3.5 7.5C3.5 5.29086 5.29086 3.5 7.5 3.5C9.70914 3.5 11.5 5.29086 11.5 7.5Z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                        </svg>
                    </span>
                </form>
                <div class="nav-menu">
                    <a
                        href="{% url 'episode_list' %}"
                        class="btn sm-nav{% if request.resolver_match.url_name == 'episode_list' or request.resolver_match.url_name == 'episode_detail' %} active{% endif %}"
                    >library</a>
                    <a
                        href="{% url 'upload' %}"
                        class="btn sm-nav{% if request.resolver_match.url_name == 'upload' or request.resolver_match.url_name == 'bulk_upload' or request.resolver_match.url_name == 'bulk_upload_confirm' or request.resolver_match.url_name == 'upload_confirm' %} active{% endif %}"
                    >upload</a>
                </div>
            </div>
        </nav>
    </header>

    <main class="page">
        <div class="{% block content_class %}content{% endblock %}">
            {% block content %}{% endblock %}
        </div>
    </main>
</body>
</html>
